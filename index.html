<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scorpion Arabia</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background-color: #1e1e2f;
            color: #fff;
            padding-top: 20px;
            transition: transform 0.3s ease;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .tab {
            padding: 15px 20px;
            cursor: pointer;
        }

        .tab:hover,
        .tab.active {
            background-color: #343454;
        }

        /* Content */
        .content {
            flex: 1;
            padding: 20px;
            background-color: #f5f5f5;
            overflow-y: auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stat-box {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 6px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        /* Mobile Header */
        .mobile-header {
            display: none;
            background: #1e1e2f;
            color: white;
            padding: 15px;
            align-items: center;
        }

        .menu-btn {
            font-size: 22px;
            cursor: pointer;
            margin-right: 15px;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                transform: translateX(-100%);
                z-index: 1000;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-header {
                display: flex;
            }

            .content {
                padding: 15px;
            }
        }
    </style>
</head>

<body>

    <!-- Mobile Header -->
    <div class="mobile-header">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div>Scorpion Arabia</div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <h2>Scorpion</h2>
        <div class="tab active" onclick="openTab('dashboard')">Dashboard</div>
        <div class="tab" onclick="openTab('docs')">Scorpion Docs</div>
        <div class="tab" onclick="openTab('projects')">Projects</div>
    </div>

    <!-- Content -->
    <div class="content">

        <div id="dashboard" class="tab-content active">
            <h1>Dashboard</h1>
            <div class="stat-box">
                <h3>Total Docs</h3>
                <p>0</p>
            </div>
            <div class="stat-box">
                <h3>Projects</h3>
                <p>0</p>
            </div>
        </div>

        <div id="docs" class="tab-content">
            <h1>Scorpion Documents</h1>
            <p>0 Docs</p>
            <button>Add Document</button>
        </div>

        <div id="projects" class="tab-content">
            <h1>Projects</h1>
            <p>0 Project Docs</p>
            <button>Add Project</button>
        </div>
    </div>

    <script>
        function openTab(tabId) {
            document.querySelectorAll('.tab-content')
                .forEach(c => c.classList.remove('active'));

            document.querySelectorAll('.tab')
                .forEach(t => t.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');

            // Auto close sidebar on mobile
            if (window.innerWidth <= 768) {
                toggleMenu();
            }
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>

</body>
</html>
