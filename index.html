<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorpion Arabia - Premium V2</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;
  --card:#111827;
  --accent:#22c55e;
  --accent2:#3b82f6;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

body{margin:0;font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}

/* Sidebar */
.sidebar{
  width:250px;
  height:100vh;
  background:#020617;
  position:fixed;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:30px;
}

.logo img{width:42px;height:42px;border-radius:10px}

.nav-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  color:var(--muted);
  transition:0.3s;
}

.nav-item:hover{
  background:#1e293b;
  color:#fff;
  transform:translateX(6px);
}

/* Main */
.main{margin-left:270px;padding:30px}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
}

.title{font-size:24px;font-weight:600}

/* Stats */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.stat{
  background:var(--card);
  padding:18px;
  border-radius:14px;
  transition:.3s;
}

.stat:hover{transform:translateY(-6px);box-shadow:0 10px 25px rgba(0,0,0,.4)}

.stat h2{margin:0;font-size:22px}

/* Cards */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  transition:.3s;
  position:relative;
  overflow:hidden;
}

.card::after{
  content:"";
  position:absolute;
  width:100%;height:100%;
  top:0;left:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.05),transparent);
  opacity:0;
  transition:.4s;
}

.card:hover::after{opacity:1}
.card:hover{transform:scale(1.03)}

.card h3{display:flex;gap:10px;align-items:center}

/* Sections */
.section{display:none;animation:fade .4s ease}
.active{display:block}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* Inputs */
input,button{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
}

input{width:260px}

button{
  background:var(--accent2);
  color:white;
  cursor:pointer;
  transition:.3s;
}

button:hover{background:#2563eb}

.tab-bar{margin:15px 0}
.tab-bar button{margin-right:10px}

ul{padding-left:20px}

.badge{
  background:var(--accent);
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <img src="https://via.placeholder.com/50">
    <div>
      <strong>Scorpion</strong><br>
      <small>Arabia</small>
    </div>
  </div>

  <div class="nav-item" onclick="showSection('dashboard')"><i class="fa fa-chart-line"></i> Dashboard</div>
  <div class="nav-item" onclick="showSection('scorpion')"><i class="fa fa-folder"></i> Scorpion Docs</div>
  <div class="nav-item" onclick="showSection('projects')"><i class="fa fa-briefcase"></i> Projects</div>
</div>

<div class="main">

<div id="dashboard" class="section active">
<div class="topbar">
<div class="title">Dashboard Overview</div>
</div>

<div class="stats">
<div class="stat"><h2 id="totalDocs">0</h2><p>Total Docs</p></div>
<div class="stat"><h2 id="projectsCount">0</h2><p>Projects</p></div>
<div class="stat"><h2>100%</h2><p>Compliance</p></div>
</div>

<div class="grid">
<div class="card">
<h3><i class="fa fa-folder-open"></i> Scorpion Docs</h3>
<p id="companyCount">0 Docs</p>
</div>

<div class="card">
<h3><i class="fa fa-file"></i> Project Docs</h3>
<p id="projDocCount">0 Docs</p>
</div>
</div>
</div>

<div id="scorpion" class="section">
<h2>Scorpion Documents</h2>
<input id="companyLink" placeholder="Paste OneDrive link">
<button onclick="addCompanyLink()">Add</button>
<ul id="companyList"></ul>
</div>

<div id="projects" class="section">
<h2>Projects</h2>
<input id="projectName" placeholder="New Project">
<button onclick="addProject()">Add</button>
<div id="projectList"></div>
<div id="projectDetails"></div>
</div>

</div>

<script>
function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function addCompanyLink(){
const link=document.getElementById('companyLink').value;
if(!link) return;
let data=JSON.parse(localStorage.getItem('companyLinks')||"[]");
data.push(link);
localStorage.setItem('companyLinks',JSON.stringify(data));
loadCompany();updateStats();
}

function loadCompany(){
const list=document.getElementById('companyList');
const data=JSON.parse(localStorage.getItem('companyLinks')||"[]");
list.innerHTML="";
data.forEach(l=>{
const li=document.createElement('li');
li.innerHTML=`<a href='${l}' target='_blank'>Open</a>`;
list.appendChild(li);
});
}

let projects=JSON.parse(localStorage.getItem('projectsV4')||"[]");

function addProject(){
const name=document.getElementById('projectName').value;
if(!name) return;
projects.push({name,docs:{invoices:[],jcc:[],wo:[]}});
localStorage.setItem('projectsV4',JSON.stringify(projects));
loadProjects();updateStats();
}

function loadProjects(){
const list=document.getElementById('projectList');
list.innerHTML="";
projects.forEach((p,i)=>{
const div=document.createElement('div');
div.className='card';
div.innerHTML=`${p.name} <button onclick='openProject(${i})'>Open</button>`;
list.appendChild(div);
});
}

function openProject(i){
const p=projects[i];
const d=document.getElementById('projectDetails');
d.innerHTML=`<h3>${p.name}</h3>
<div class='tab-bar'>
<button onclick="showTab(${i},'invoices')">Invoices</button>
<button onclick="showTab(${i},'jcc')">JCC</button>
<button onclick="showTab(${i},'wo')">Work Orders</button>
</div>
<div id='tab'></div>`;
}

function showTab(i,t){
const p=projects[i];
const tab=document.getElementById('tab');
tab.innerHTML=`<input id='docLink'><button onclick='addDoc(${i},"${t}")'>Add</button>
<ul>${p.docs[t].map(x=>`<li><a href='${x}' target='_blank'>Open</a></li>`).join('')}</ul>`;
}

function addDoc(i,t){
const link=document.getElementById('docLink').value;
projects[i].docs[t].push(link);
localStorage.setItem('projectsV4',JSON.stringify(projects));
showTab(i,t);updateStats();
}

function updateStats(){
const company=JSON.parse(localStorage.getItem('companyLinks')||"[]").length;
let projDocs=0;
projects.forEach(p=>{projDocs+=p.docs.invoices.length+p.docs.jcc.length+p.docs.wo.length});

document.getElementById('totalDocs').innerText=company+projDocs;
document.getElementById('projectsCount').innerText=projects.length;
document.getElementById('companyCount').innerText=company+" Docs";
document.getElementById('projDocCount').innerText=projDocs+" Docs";
}

loadCompany();loadProjects();updateStats();
</script>

</body>
</html>
