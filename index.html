<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scorpion Dashboard</title>
<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
.sidebar{width:220px;height:100vh;background:#111827;color:#fff;position:fixed;padding:20px}
.sidebar h2{margin-bottom:20px}
.sidebar p{cursor:pointer;margin:10px 0;opacity:.7}
.sidebar p:hover{opacity:1}
.main{margin-left:240px;padding:20px}
.section{display:none}
.active{display:block}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
input,button{padding:8px;margin:5px;border-radius:6px;border:1px solid #ccc}
button{background:#2563eb;color:#fff;border:none;cursor:pointer}
.tab-btn{margin-right:5px}
</style>
</head>
<body>

<div class="sidebar">
<h2>Dashboard</h2>
<p onclick="showSection('scorpion')">Scorpion Documents</p>
<p onclick="showSection('projects')">Project Documents</p>
<p onclick="showSection('manpower')">Manpower Documents</p>
<p onclick="showSection('equipment')">Equipment Documents</p>
</div>

<div class="main">

<!-- Scorpion Documents -->
<div id="scorpion" class="section active">
<h2>Scorpion Documents</h2>
<input type="text" id="companyLink" placeholder="Paste OneDrive Link">
<button onclick="addCompanyLink()">Add</button>
<ul id="companyList"></ul>
</div>

<!-- Project Documents -->
<div id="projects" class="section">
<h2>Project Documents</h2>
<input type="text" id="projectName" placeholder="New Project Name">
<button onclick="addProject()">Add Project</button>

<div id="projectList"></div>

<div id="projectDetails"></div>
</div>

<!-- Manpower -->
<div id="manpower" class="section">
<h2>Manpower Documents</h2>
<p>Coming soon</p>
</div>

<!-- Equipment -->
<div id="equipment" class="section">
<h2>Equipment Documents</h2>
<p>Coming soon</p>
</div>

</div>

<script>
// Navigation
function showSection(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// Scorpion Docs
function addCompanyLink(){
 const link=document.getElementById('companyLink').value;
 if(!link) return;
 const data=JSON.parse(localStorage.getItem('companyLinks')||"[]");
 data.push(link);
 localStorage.setItem('companyLinks',JSON.stringify(data));
 loadCompanyLinks();
}

function loadCompanyLinks(){
 const list=document.getElementById('companyList');
 const data=JSON.parse(localStorage.getItem('companyLinks')||"[]");
 list.innerHTML="";
 data.forEach(l=>{
 const li=document.createElement('li');
 li.innerHTML=`<a href='${l}' target='_blank'>Open Document</a>`;
 list.appendChild(li);
 });
}

// Projects
let projects=JSON.parse(localStorage.getItem('projectsV2')||"[]");

function addProject(){
 const name=document.getElementById('projectName').value;
 if(!name) return;
 projects.push({name,docs:{invoices:[],jcc:[],wo:[]}});
 localStorage.setItem('projectsV2',JSON.stringify(projects));
 loadProjects();
}

function deleteProject(index){
 projects.splice(index,1);
 localStorage.setItem('projectsV2',JSON.stringify(projects));
 loadProjects();
 document.getElementById('projectDetails').innerHTML="";
}

function loadProjects(){
 const list=document.getElementById('projectList');
 list.innerHTML="";
 projects.forEach((p,i)=>{
 const div=document.createElement('div');
 div.className='card';
 div.innerHTML=`${p.name} 
 <button onclick='openProject(${i})'>Open</button>
 <button onclick='deleteProject(${i})'>Delete</button>`;
 list.appendChild(div);
 });
}

function openProject(index){
 const p=projects[index];
 const div=document.getElementById('projectDetails');
 div.innerHTML=`
 <h3>${p.name}</h3>
 <button class='tab-btn' onclick="showTab(${index},'invoices')">Invoices</button>
 <button class='tab-btn' onclick="showTab(${index},'jcc')">Job Completion Certificates</button>
 <button class='tab-btn' onclick="showTab(${index},'wo')">Work Orders</button>
 <div id='tabContent'></div>`;
}

function showTab(index,type){
 const p=projects[index];
 const content=document.getElementById('tabContent');
 content.innerHTML=`
 <input type='text' id='docLink' placeholder='Paste OneDrive Link'>
 <button onclick='addDoc(${index},"${type}")'>Add</button>
 <ul>${p.docs[type].map(d=>`<li><a href='${d}' target='_blank'>Open</a></li>`).join('')}</ul>`;
}

function addDoc(index,type){
 const link=document.getElementById('docLink').value;
 if(!link) return;
 projects[index].docs[type].push(link);
 localStorage.setItem('projectsV2',JSON.stringify(projects));
 showTab(index,type);
}

// Init
loadCompanyLinks();
loadProjects();
</script>

</body>
</html>
